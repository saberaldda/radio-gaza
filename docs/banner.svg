<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Radio Gaza — Web platform and CMS for a Palestinian radio station">
  <defs>
    <!-- Radio Gaza navy background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1220"/>
      <stop offset="0.55" stop-color="#0d1a2e"/>
      <stop offset="1" stop-color="#060d18"/>
    </linearGradient>
    <!-- Radio Gaza gold accent #ca9a00 -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ca9a00"/>
      <stop offset="1" stop-color="#e0b000"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.2" r="0.55">
      <stop offset="0" stop-color="#ca9a00" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ca9a00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- Decorative broadcast rings — gold, navy brand colors -->
  <g opacity="0.1" stroke="#ca9a00" stroke-width="1.5" fill="none">
    <circle cx="1060" cy="158" r="55"/>
    <circle cx="1060" cy="158" r="88"/>
    <circle cx="1060" cy="158" r="122"/>
    <circle cx="1060" cy="158" r="158"/>
  </g>
  <!-- Diamond grid from actual site canvas animation -->
  <g opacity="0.04" stroke="#ca9a00" stroke-width="0.5" fill="none">
    <path d="M870,0 L950,80 L870,160 L790,80 Z"/>
    <path d="M950,80 L1030,160 L950,240 L870,160 Z"/>
    <path d="M1030,0 L1110,80 L1030,160 L950,80 Z"/>
    <path d="M1110,80 L1190,160 L1110,240 L1030,160 Z"/>
    <path d="M790,160 L870,240 L790,320 L710,240 Z"/>
    <path d="M870,240 L950,320 L870,400 L790,320 Z"/>
  </g>

  <g transform="translate(80,64)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="600" letter-spacing="6" fill="url(#gold)">PRODUCTION PLATFORM</text>

    <text x="0" y="78" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#f5efe0">Radio Gaza</text>

    <text x="0" y="132" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#c8b87a">Web platform and CMS for a Palestinian radio station.</text>
    <text x="0" y="165" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#8a7a50">Live audio streaming · news · push notifications · mobile API · fully Arabic RTL</text>

    <g transform="translate(0,198)" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15">
      <rect x="0" y="0" width="490" height="38" rx="6" fill="#060d18" stroke="#1e2e18" opacity="1"/>
      <rect x="0" y="0" width="490" height="38" rx="6" fill="none" stroke="#32446a"/>
      <text x="14" y="25" fill="#8a7a50">🌐</text>
      <text x="38" y="25" fill="#e0b000">radiogaza.com</text>
      <text x="186" y="25" fill="#32446a"> · </text>
      <text x="202" y="25" fill="#8a7a50">Laravel 11 · Passport · Firebase FCM</text>
    </g>
  </g>

  <!-- Mock player card — navy #32446a + gold #ca9a00 brand -->
  <g transform="translate(878,68)" opacity="0.93">
    <rect x="0" y="0" width="256" height="196" rx="12" fill="#060d18" stroke="#32446a"/>
    <!-- Header — navy #32446a -->
    <rect x="0" y="0" width="256" height="40" rx="12" fill="#32446a"/>
    <rect x="0" y="28" width="256" height="12" fill="#32446a"/>
    <!-- Gold mic icon area -->
    <circle cx="20" cy="20" r="8" fill="#ca9a00" opacity="0.3"/>
    <circle cx="20" cy="20" r="4" fill="#ca9a00"/>
    <text x="36" y="25" font-family="ui-sans-serif, sans-serif" font-size="11" fill="#f5efe0" font-weight="700">راديو غزة 106.3 FM</text>
    <!-- LIVE badge -->
    <rect x="202" y="13" width="40" height="14" rx="4" fill="#dc2626"/>
    <text x="222" y="23" font-family="ui-sans-serif, sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle">● LIVE</text>
    <!-- Gold waveform bars -->
    <g transform="translate(14,52)" fill="#ca9a00" opacity="0.75">
      <rect x="0"   y="14" width="7" height="14" rx="2"/>
      <rect x="12"  y="7"  width="7" height="28" rx="2"/>
      <rect x="24"  y="2"  width="7" height="38" rx="2"/>
      <rect x="36"  y="9"  width="7" height="24" rx="2"/>
      <rect x="48"  y="16" width="7" height="10" rx="2"/>
      <rect x="60"  y="3"  width="7" height="36" rx="2"/>
      <rect x="72"  y="11" width="7" height="20" rx="2"/>
      <rect x="84"  y="0"  width="7" height="42" rx="2"/>
      <rect x="96"  y="8"  width="7" height="26" rx="2"/>
      <rect x="108" y="18" width="7" height="6"  rx="2"/>
      <rect x="120" y="5"  width="7" height="32" rx="2"/>
      <rect x="132" y="13" width="7" height="16" rx="2"/>
      <rect x="144" y="3"  width="7" height="36" rx="2"/>
      <rect x="156" y="11" width="7" height="20" rx="2"/>
      <rect x="168" y="6"  width="7" height="30" rx="2"/>
      <rect x="180" y="14" width="7" height="14" rx="2"/>
      <rect x="192" y="1"  width="7" height="40" rx="2"/>
      <rect x="204" y="9"  width="7" height="24" rx="2"/>
      <rect x="216" y="16" width="7" height="10" rx="2"/>
    </g>
    <!-- News rows -->
    <rect x="14" y="112" width="228" height="7" rx="3" fill="#32446a"/>
    <rect x="14" y="127" width="195" height="7" rx="3" fill="#1a2438"/>
    <rect x="14" y="142" width="215" height="7" rx="3" fill="#32446a"/>
    <!-- Gold CTA button -->
    <rect x="14" y="160" width="104" height="18" rx="5" fill="url(#gold)"/>
    <text x="66" y="172" font-family="ui-sans-serif, sans-serif" font-size="8" font-weight="700" fill="#06121e" text-anchor="middle">🔔 NOTIFICATIONS</text>
    <!-- Navy secondary button -->
    <rect x="128" y="160" width="76" height="18" rx="5" fill="#32446a"/>
    <text x="166" y="172" font-family="ui-sans-serif, sans-serif" font-size="8" font-weight="600" fill="#f5efe0" text-anchor="middle">📰 NEWS</text>
  </g>
</svg>
